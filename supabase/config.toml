# Supabase project configuration for PandaSplit.
# Run `supabase start` to spin up the local stack and `supabase db reset`
# to apply every migration in order from /supabase/migrations.

project_id = "pandasplit"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "pandasplit://auth-callback"
additional_redirect_urls = ["pandasplit://auth-callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = true
enable_confirmations = true

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.notify_on_expense]
verify_jwt = false

[functions.notify_on_settlement]
verify_jwt = false

[functions.friend_invite_link]
verify_jwt = false

[functions.recurring_runner]
verify_jwt = false

[functions.fx_refresh]
verify_jwt = false
